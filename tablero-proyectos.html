<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tablero Proyectos Pro</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: #ffffff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --danger: #dc2626;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
    }
    * { box-sizing: border-box; transition: all 0.2s ease; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    header {
      background: white; border-bottom: 1px solid var(--border);
      padding: 1rem 0; position: sticky; top: 0; z-index: 50;
    }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; }
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    
    input, select, button {
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 12px; font-size: 14px; outline: none;
    }
    .btn-primary { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: 600; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-ghost { background: transparent; color: var(--text-muted); cursor: pointer; }
    .btn-ghost:hover { background: #f9fafb; color: var(--text); }

    .board {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px; padding: 25px 20px; max-width: 1200px; margin: 0 auto;
    }
    @media (max-width: 900px) { .board { grid-template-columns: 1fr; } }

    .col { background: #eaecf0; border-radius: var(--radius); display: flex; flex-direction: column; min-height: 70vh; }
    .colhead { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .coltitle { font-weight: 800; font-size: 13px; color: #4b5563; text-transform: uppercase; letter-spacing: 0.5px; }
    .count { background: #d1d5db; color: #374151; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }

    .dropzone { padding: 10px; flex: 1; display: flex; flex-direction: column; gap: 12px; }
    .dropzone.dragover { background: #cbd5e1; border-radius: 0 0 12px 12px; }

    .card {
      background: white; border-radius: 10px; padding: 15px;
      box-shadow: var(--shadow); cursor: grab; border: 1px solid transparent;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .cardtitle { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
    
    .pill { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 6px; display: inline-block; margin-right: 5px; margin-bottom: 5px; }
    .prio-muyalta { background: #fee2e2; color: #991b1b; }
    .prio-alta { background: #ffedd5; color: #9a3412; }
    .prio-media { background: #dcfce7; color: #166534; }
    .prio-baja { background: #f3f4f6; color: #4b5563; }
    .next-pill { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }

    .notes { font-size: 13px; color: var(--text-muted); margin-top: 10px; line-height: 1.4; }
    .cardactions { margin-top: 12px; display: flex; gap: 8px; opacity: 0.4; }
    .card:hover .cardactions { opacity: 1; }
    .cardactions button { padding: 4px 8px; font-size: 11px; cursor: pointer; }

    /* Modal */
    .modalback {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal { background: white; width: 500px; border-radius: 16px; padding: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    .modal h3 { margin-top: 0; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 15px 0; }
    textarea { width: 100%; height: 80px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: inherit; }
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:10px">
        <h1 style="margin:0; font-size:20px">🧠 Mis Proyectos</h1>
      </div>
      <div class="controls">
        <input id="q" placeholder="Buscar..." />
        <select id="prio">
          <option value="">Prioridad</option>
          <option value="MUY ALTA">Muy Alta</option>
          <option value="ALTA">Alta</option>
          <option value="MEDIA">Media</option>
          <option value="BAJA">Baja</option>
        </select>
        <button class="btn-primary" id="add">Nueva Tarjeta</button>
        <button class="btn-ghost" onclick="exportData()" title="Descargar Backup">💾</button>
        <button class="btn-ghost" onclick="document.getElementById('importFile').click()" title="Cargar Backup">📂</button>
        <input type="file" id="importFile" style="display:none" onchange="importData(this)" />
        <button class="btn-ghost" id="wipe" style="color:var(--danger)">Reset</button>
      </div>
    </div>
  </div>
</header>

<main class="board" id="board"></main>

<div class="modalback" id="modalBack">
  <div class="modal">
    <h3 id="modalTitle">Nueva Tarjeta</h3>
    <input id="fTitle" style="width:100%" placeholder="Nombre del proyecto" />
    <div class="modal-grid">
      <select id="fCol">
        <option value="IDEAS">IDEAS</option>
        <option value="INCUBACION">INCUBACIÓN</option>
        <option value="ACTIVOS">ACTIVOS</option>
      </select>
      <select id="fPrio">
        <option value="MUY ALTA">MUY ALTA</option>
        <option value="ALTA">ALTA</option>
        <option value="MEDIA">MEDIA</option>
        <option value="BAJA">BAJA</option>
      </select>
    </div>
    <input id="fNext" style="width:100%; margin-bottom:15px" placeholder="Próxima acción (Ej: Llamar a cliente)" />
    <textarea id="fNotes" placeholder="Notas adicionales..."></textarea>
    <div style="margin-top:20px; display:flex; justify-content:flex-end; gap:10px">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" id="saveBtn">Guardar</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = "tablero_proyectos_v1";
  const columns = [
    { id:"IDEAS", label:"IDEAS" },
    { id:"INCUBACION", label:"INCUBACIÓN" },
    { id:"ACTIVOS", label:"ACTIVOS" },
  ];

  let state = load() ?? seed();
  let editingId = null;

  function seed(){
    // PROYECTOS ORIGINALES RECUPERADOS
    const mk = (title, col, prio, next, notes="") => ({
      id: crypto.randomUUID?.() ?? String(Date.now() + Math.random()),
      title, col, prio, next, notes, createdAt: Date.now()
    });
    return {
      cards: [
        mk("Contador Mundial","ACTIVOS","MEDIA","Optimizar monetización (ads/embeds)","Proyecto vitrina"),
        mk("Cargador Boiler","ACTIVOS","ALTA","Definir canal de venta fijo","Validar mercado real"),
        mk("Venta y Control","ACTIVOS","MUY ALTA","Cerrar manual de ventas y delegar","Tronco del negocio"),
        mk("Imprime Ya","INCUBACION","MEDIA","Definir oferta clara","Paquete B2B simple"),
        mk("Conferencia","INCUBACION","MEDIA","Definir tema central","Pasar de técnico a referente"),
        mk("Ultrasonido Scouting","ACTIVOS","ALTA","Mapear oportunidades regionales","Apuesta estratégica"),
        mk("Bichicori Rapstyle","ACTIVOS","MEDIA","Cerrar formatos y flujo de contenido","Raíz creativa"),
        mk("Mapping","IDEAS","BAJA","Definir un demo concreto","Alto potencial, baja urgencia"),
        mk("Refranario de Barrio","IDEAS","BAJA","Crear 5 piezas piloto","Simple y constante"),
        mk("Comic Julio Pablos","INCUBACION","MEDIA","Convertir a microhistoria","El valor es el vínculo"),
        mk("Ingeniería Inversa","INCUBACION","MEDIA","Documentar un caso real","I+D personal"),
        mk("Cypher","ACTIVOS","MEDIA","Calendarizar una sesión grabable","Comunidad viva")
      ]
    };
  }

  function load(){ return JSON.parse(localStorage.getItem(STORAGE_KEY)); }
  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  function render(){
    const board = document.getElementById("board");
    board.innerHTML = "";
    const query = document.getElementById("q").value.toLowerCase();
    const filterPrio = document.getElementById("prio").value;

    columns.forEach(col => {
      const colEl = document.createElement("div");
      colEl.className = "col";
      const cards = state.cards.filter(c => c.col === col.id)
        .filter(c => !filterPrio || c.prio === filterPrio)
        .filter(c => c.title.toLowerCase().includes(query) || c.notes.toLowerCase().includes(query));

      colEl.innerHTML = `<div class="colhead"><span class="coltitle">${col.label}</span><span class="count">${cards.length}</span></div>`;
      
      const dz = document.createElement("div");
      dz.className = "dropzone";
      dz.dataset.col = col.id;
      dz.ondragover = e => { e.preventDefault(); dz.classList.add("dragover"); };
      dz.ondragleave = () => dz.classList.remove("dragover");
      dz.ondrop = e => {
        const id = e.dataTransfer.getData("text");
        const card = state.cards.find(c => c.id === id);
        if(card) card.col = col.id;
        save(); render();
      };

      cards.forEach(card => {
        const el = document.createElement("div");
        el.className = "card";
        el.draggable = true;
        el.ondragstart = e => e.dataTransfer.setData("text", card.id);
        el.onclick = () => openModal(card.id);
        el.innerHTML = `
          <div class="cardtitle">${card.title}</div>
          <span class="pill prio-${card.prio.toLowerCase().replace(" ","")}">${card.prio}</span>
          ${card.next ? `<span class="pill next-pill">▶ ${card.next}</span>` : ""}
          ${card.notes ? `<div class="notes">${card.notes}</div>` : ""}
          <div class="cardactions">
            <button onclick="event.stopPropagation(); delCard('${card.id}')">Eliminar</button>
          </div>
        `;
        dz.appendChild(el);
      });
      colEl.appendChild(dz);
      board.appendChild(colEl);
    });
  }

  // Funciones de Sincronización
  function exportData() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
    const dlAnchorElem = document.createElement('a');
    dlAnchorElem.setAttribute("href", dataStr);
    dlAnchorElem.setAttribute("download", "backup_proyectos.json");
    dlAnchorElem.click();
  }

  function importData(input) {
    const reader = new FileReader();
    reader.onload = function(){
      state = JSON.parse(reader.result);
      save(); render();
    };
    reader.readAsText(input.files[0]);
  }

  // Lógica de Modal (CRUD)
  function openModal(id = null){
    editingId = id;
    const card = state.cards.find(c => c.id === id) || { title:"", col:"IDEAS", prio:"MEDIA", next:"", notes:"" };
    document.getElementById("fTitle").value = card.title;
    document.getElementById("fCol").value = card.col;
    document.getElementById("fPrio").value = card.prio;
    document.getElementById("fNext").value = card.next;
    document.getElementById("fNotes").value = card.notes;
    document.getElementById("modalBack").style.display = "flex";
  }

  function closeModal(){ document.getElementById("modalBack").style.display = "none"; }

  document.getElementById("saveBtn").onclick = () => {
    const payload = {
      title: document.getElementById("fTitle").value,
      col: document.getElementById("fCol").value,
      prio: document.getElementById("fPrio").value,
      next: document.getElementById("fNext").value,
      notes: document.getElementById("fNotes").value
    };
    if(editingId){
      const idx = state.cards.findIndex(c => c.id === editingId);
      state.cards[idx] = { ...state.cards[idx], ...payload };
    } else {
      state.cards.push({ id: crypto.randomUUID(), ...payload, createdAt: Date.now() });
    }
    save(); render(); closeModal();
  };

  function delCard(id){ if(confirm("¿Eliminar?")) { state.cards = state.cards.filter(c => c.id !== id); save(); render(); } }

  document.getElementById("add").onclick = () => openModal();
  document.getElementById("q").oninput = render;
  document.getElementById("prio").onchange = render;
  document.getElementById("wipe").onclick = () => { if(confirm("Borrar todo?")) { state = seed(); save(); render(); } };

  render();
</script>
</body>
</html>
