<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio de Innovación | CANACINTRA Jóvenes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 28px;
        }
        .line-clamp-description {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            height: 4.5em;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen">

    <header class="bg-white border-b border-slate-200/80 py-16 px-4 text-center shadow-xs">
        <div class="max-w-4xl mx-auto flex flex-col items-center">
            
            <div class="mb-4 flex items-center space-x-3 text-blue-900">
                <svg class="h-10 w-auto fill-current text-blue-900" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20,10 L45,10 L55,30 L45,50 L20,50 L10,30 Z M27,18 L38,18 L43,30 L38,42 L27,42 L22,30 Z" />
                    <text x="65" y="32" font-family="Arial, sans-serif" font-weight="900" font-size="20" fill="currentColor">CANACINTRA</text>
                    <text x="65" y="47" font-family="Arial, sans-serif" font-weight="700" font-size="11" fill="#0284c7" letter-spacing="2">JÓVENES</text>
                </svg>
            </div>
            
            <span class="bg-blue-50 text-blue-700 text-[11px] uppercase font-bold tracking-widest px-3 py-1 rounded-md border border-blue-200/60 shadow-xs">
                Ecosistema de Emprendimiento Local
            </span>
            <h1 class="text-3xl md:text-5xl font-black mt-4 mb-3 tracking-tight text-slate-900">
                Portafolio de Innovación y Negocios
            </h1>
            <p class="text-base md:text-lg text-slate-500 font-normal max-w-2xl leading-relaxed">
                Conoce y conecta de forma estratégica con las empresas lideradas por los jóvenes talentos de la cámara.
            </p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        
        <div class="max-w-md mx-auto mb-10">
            <input type="text" id="search-input" oninput="buscarEmpresa()" placeholder="🔍 Buscar por nombre de empresa..." class="w-full px-5 py-3 rounded-xl bg-white border border-slate-200 shadow-xs focus:outline-hidden focus:ring-2 focus:ring-blue-900/20 focus:border-blue-900 transition-all text-sm">
        </div>

        <div class="mb-12 text-center">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-3">Filtrar por sector industrial</span>
            <div id="category-filters" class="flex flex-wrap justify-center gap-2">
                <button id="btn-todos" onclick="filtrarCategoria('TODOS')" class="filter-btn px-5 py-2 text-xs uppercase font-bold tracking-wider rounded-lg bg-blue-900 text-white shadow-sm transition-all cursor-pointer">
                    Todos
                </button>
            </div>
        </div>

        <div id="loading" class="text-center text-slate-400 py-16 text-sm font-medium animate-pulse">
            Cargando ecosistema local...
        </div>

        <div id="directorio" class="card-grid hidden">
            </div>
    </main>

    <footer class="text-center py-8 text-slate-400 border-t border-slate-200 mt-20 bg-white">
        <p class="text-xs tracking-wider uppercase font-medium">&copy; 2026 CANACINTRA Jóvenes. Portafolio Optimizado Integrado.</p>
    </footer>

    <script>
        // 💾 BASE DE DATOS INYECTADA DIRECTAMENTE (Plan C - Blindado de Workspace)
        // Puedes agregar más registros aquí duplicando un bloque { ... } separado por comas
        const baseDeDatosLocal = [
            {
                socio: 'Jorge Huerta',
                empresa: 'Don Sistemas',
                giro: 'Tecnología',
                descripcion: 'Servicios Tecnológicos e Integrales de hardware, redes y soluciones de software para PyMEs.',
                logo: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=400&q=80',
                contacto: '#'
            },
            {
                socio: 'Soy de Prueba',
                empresa: 'Servicios Diversos a Todos',
                giro: 'Servicios',
                descripcion: 'Consultoría y atención especializada en multiservicios industriales dentro de la región.',
                logo: 'https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?auto=format&fit=crop&w=400&q=80',
                contacto: '#'
            }
        ];

        let todosLosEmprendimientos = [];
        let categoriaActual = 'TODOS';

        function cargarDirectorio() {
            // Simulamos una carga de red rápida para mantener la experiencia premium
            setTimeout(() => {
                todosLosEmprendimientos = baseDeDatosLocal;
                const categoriasUnicas = new Set();

                todosLosEmprendimientos.forEach(item => {
                    if(item.giro) categoriasUnicas.add(item.giro);
                });

                generarBotonesFiltros(categoriasUnicas);
                renderizarTarjetas(todosLosEmprendimientos);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('directorio').classList.remove('hidden');
            }, 400);
        }

        function generarBotonesFiltros(categorias) {
            const contenedor = document.getElementById('category-filters');
            const existentes = contenedor.querySelectorAll('.filter-btn:not(#btn-todos)');
            existentes.forEach(b => b.remove());

            categorias.forEach(cat => {
                if(!cat) return;
                const btn = document.createElement('button');
                btn.className = "filter-btn px-5 py-2 text-xs uppercase font-bold tracking-wider rounded-lg bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-all cursor-pointer shadow-2xs";
                btn.innerText = cat;
                btn.onclick = () => filtrarCategoria(cat, btn);
                contenedor.appendChild(btn);
            });
        }

        function renderizarTarjetas(items) {
            const contenedor = document.getElementById('directorio');
            contenedor.innerHTML = '';

            if(items.length === 0) {
                contenedor.innerHTML = '<div class="col-span-full text-center py-12 text-slate-400 text-sm">No se encontraron emprendimientos que coincidan.</div>';
                return;
            }

            items.forEach(item => {
                const html = `
                    <div class="bg-white rounded-2xl overflow-hidden border border-slate-200/70 flex flex-col justify-between transition-all duration-300 hover:-translate-y-1 hover:shadow-md hover:border-blue-200">
                        <div>
                            <div class="h-44 w-full bg-slate-50 flex items-center justify-center overflow-hidden border-b border-slate-100">
                                <img class="w-full h-full object-contain p-6" src="${item.logo}" alt="Logo corporativo" onerror="this.src='https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=400&q=80'">
                            </div>
                            <div class="p-6">
                                <span class="inline-block px-2.5 py-0.5 text-[10px] font-bold tracking-wider uppercase rounded-md bg-blue-50 text-blue-700 mb-3 border border-blue-100">
                                    ${item.giro}
                                </span>
                                <h2 class="text-xl font-bold text-slate-900 mb-0.5 tracking-tight truncate">${item.empresa}</h2>
                                <p class="text-xs text-slate-400 mb-4 font-medium">Socio: <span class="text-slate-600">${item.socio}</span></p>
                                <p class="text-slate-600 text-xs leading-relaxed line-clamp-description font-normal">${item.descripcion}</p>
                            </div>
                        </div>
                        <div class="p-6 pt-0">
                            <a href="${item.contacto}" target="_blank" class="block text-center w-full bg-blue-900 hover:bg-blue-950 text-white font-semibold py-2.5 px-4 rounded-xl transition-all duration-200 text-xs uppercase tracking-wide shadow-xs">
                                Enlace Comercial / Redes
                            </a>
                        </div>
                    </div>
                `;
                contenedor.innerHTML += html;
            });
        }

        function filtrarCategoria(categoria, botonSeleccionado) {
            categoriaActual = categoria;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = "filter-btn px-5 py-2 text-xs uppercase font-bold tracking-wider rounded-lg bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-all cursor-pointer shadow-2xs";
            });
            
            if(botonSeleccionado) {
                botonSeleccionado.className = "filter-btn px-5 py-2 text-xs uppercase font-bold tracking-wider rounded-lg bg-blue-900 text-white shadow-sm transition-all cursor-pointer";
            } else {
                document.getElementById('btn-todos').className = "filter-btn px-5 py-2 text-xs uppercase font-bold tracking-wider rounded-lg bg-blue-900 text-white shadow-sm transition-all cursor-pointer";
            }

            ejecutarFiltroCombinado();
        }

        function buscarEmpresa() { 
            ejecutarFiltroCombinado(); 
        }

        function ejecutarFiltroCombinado() {
            const textoBusqueda = document.getElementById('search-input').value.toLowerCase().trim();
            let filtrados = todosLosEmprendimientos;

            if (categoriaActual !== 'TODOS') {
                filtrados = filtrados.filter(item => item.giro === categoriaActual);
            }

            if (textoBusqueda !== '') {
                filtrados = filtrados.filter(item => item.empresa.toLowerCase().includes(textoBusqueda));
            }

            renderizarTarjetas(filtrados);
        }

        window.onload = cargarDirectorio;
    </script>
</body>
</html>
