<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio | CANACINTRA Jóvenes</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .line-clamp-description {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            height: 4.5em;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased min-h-screen">

    <!-- ENCABEZADO -->
    <header class="bg-white border-b border-slate-200 py-12 px-4 text-center shadow-xs">
        <div class="max-w-4xl mx-auto flex flex-col items-center">
            <span class="bg-blue-50 text-blue-700 text-[10px] uppercase font-bold tracking-widest px-2.5 py-1 rounded-md border border-blue-100">
                CANACINTRA JÓVENES
            </span>
            <h1 class="text-3xl md:text-4xl font-black mt-3 mb-2 tracking-tight text-slate-900">
                Portafolio de Innovación y Negocios
            </h1>
            <p class="text-sm text-slate-500 max-w-xl">
                Directorio automatizado en tiempo real conectado a Google Sheets.
            </p>
        </div>
    </header>

    <!-- CONTENEDOR PRINCIPAL -->
    <main class="max-w-7xl mx-auto px-4 py-10">
        
        <!-- BUSCADOR -->
        <div class="max-w-md mx-auto mb-8">
            <input type="text" id="search-input" oninput="buscarEmpresa()" placeholder="🔍 Buscar por nombre de empresa..." class="w-full px-4 py-2.5 rounded-xl bg-white border border-slate-200 shadow-xs text-sm focus:outline-hidden focus:ring-2 focus:ring-blue-900/20">
        </div>

        <!-- FILTROS -->
        <div class="mb-10 text-center">
            <div id="category-filters" class="flex flex-wrap justify-center gap-2">
                <button id="btn-todos" onclick="filtrarCategoria('TODOS')" class="filter-btn px-4 py-1.5 text-xs uppercase font-bold rounded-lg bg-blue-900 text-white cursor-pointer shadow-xs">
                    Todos
                </button>
            </div>
        </div>

        <!-- ESTADO DE CARGA / DIAGNÓSTICO -->
        <div id="loading" class="text-center text-slate-400 py-12 text-sm font-medium animate-pulse">
            Sincronizando registros en vivo...
        </div>

        <!-- GALERÍA -->
        <div id="directorio" class="card-grid hidden">
            <!-- Tarjetas automáticas -->
        </div>
    </main>

    <script>
        // URL universal por exportación nativa de Google Sheets
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1Dr5johlcPcBbh3h2X5DmigyhyPhoOHWYW-eB1fqclpk/export?format=csv&gid=1329152889';

        let todosLosEmprendimientos = [];
        let categoriaActual = 'TODOS';

        async function cargarDirectorio() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status} ${response.statusText}`);
                
                const data = await response.text();
                if (!data || data.trim().length === 0) throw new Error('El archivo llegó vacío.');

                // Procesamiento limpio de filas y eliminación de retornos de carro
                const filas = data.replace(/\r/g, '').split('\n').slice(1);
                const categoriasUnicas = new Set();
                todosLosEmprendimientos = [];

                filas.forEach(fila => {
                    if (!fila.trim()) return;
                    const columnas = fila.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (columnas.length < 6) return;

                    let rawLogo = columnas[6]?.replace(/"/g, '').trim() || '';
                    if (!rawLogo || rawLogo.length < 10) {
                        rawLogo = 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=400&q=80';
                    } else if (rawLogo.includes('drive.google.com')) {
                        const fileId = rawLogo.match(/id=([^&]+)/) || rawLogo.match(/\/d\/([^/]+)/);
                        if (fileId) rawLogo = `https://docs.google.com/uc?export=view&id=${fileId[1]}`;
                    }

                    const item = {
                        socio: columnas[2]?.replace(/"/g, '').trim() || 'Socio Activo',
                        empresa: columnas[3]?.replace(/"/g, '').trim() || 'Empresa Local',
                        giro: columnas[4]?.replace(/"/g, '').trim() || 'General',
                        descripcion: columnas[5]?.replace(/"/g, '').trim() || 'Sin descripción disponible.',
                        logo: rawLogo,
                        contacto: columnas[7]?.replace(/"/g, '').trim() || '#'
                    };

                    todosLosEmprendimientos.push(item);
                    if(item.giro) categoriasUnicas.add(item.giro);
                });

                generarBotonesFiltros(categoriasUnicas);
                renderizarTarjetas(todosLosEmprendimientos);

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('directorio').classList.remove('hidden');

            } catch (error) {
                console.error("Falla:", error);
                document.getElementById('loading').innerHTML = `
                    <div class="bg-red-50 text-red-700 p-4 rounded-xl inline-block border border-red-100 text-xs font-mono">
                        <strong>Fallo de sincronización:</strong> ${error.message}<br>
                        <span class="text-slate-400 text-[10px]">Verifica los datos en tu GitHub Pages tras realizar el push.</span>
                    </div>`;
            }
        }

        function generarBotonesFiltros(categorias) {
            const contenedor = document.getElementById('category-filters');
            const existentes = contenedor.querySelectorAll('.filter-btn:not(#btn-todos)');
            existentes.forEach(b => b.remove());

            categorias.forEach(cat => {
                if(!cat) return;
                const btn = document.createElement('button');
                btn.className = "filter-btn px-4 py-1.5 text-xs uppercase font-bold rounded-lg bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-all cursor-pointer";
                btn.innerText = cat;
                btn.onclick = () => filtrarCategoria(cat, btn);
                contenedor.appendChild(btn);
            });
        }

        function renderizarTarjetas(items) {
            const contenedor = document.getElementById('directorio');
            contenedor.innerHTML = '';

            if(items.length === 0) {
                contenedor.innerHTML = '<div class="col-span-full text-center py-6 text-slate-400 text-xs">Sin resultados.</div>';
                return;
            }

            items.forEach(item => {
                contenedor.innerHTML += `
                    <div class="bg-white rounded-xl overflow-hidden border border-slate-200 flex flex-col justify-between transition-all duration-200 hover:-translate-y-0.5 hover:shadow-xs">
                        <div>
                            <div class="h-40 w-full bg-slate-50 flex items-center justify-center overflow-hidden border-b border-slate-100">
                                <img class="w-full h-full object-contain p-4" src="${item.logo}" onerror="this.src='https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=400&q=80'">
                            </div>
                            <div class="p-5">
                                <span class="inline-block px-2 py-0.5 text-[9px] font-bold uppercase rounded-md bg-blue-50 text-blue-700 mb-2 border border-blue-100">${item.giro}</span>
                                <h2 class="text-lg font-bold text-slate-900 truncate mb-0.5">${item.empresa}</h2>
                                <p class="text-[11px] text-slate-400 mb-3">Socio: <span class="text-slate-600 font-medium">${item.socio}</span></p>
                                <p class="text-slate-600 text-xs leading-relaxed line-clamp-description">${item.descripcion}</p>
                            </div>
                        </div>
                        <div class="p-5 pt-0">
                            <a href="${item.contacto}" target="_blank" class="block text-center w-full bg-blue-900 hover:bg-blue-950 text-white font-semibold py-2 px-3 rounded-lg transition-all text-xs uppercase tracking-wide">
                                Contactar
                            </a>
                        </div>
                    </div>
                `;
            });
        }

        function filtrarCategoria(categoria, boton) {
            categoriaActual = categoria;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.className = "filter-btn px-4 py-1.5 text-xs uppercase font-bold rounded-lg bg-white text-slate-600 border border-slate-200 hover:bg-slate-50 transition-all cursor-pointer";
            });
            if(boton) {
                boton.className = "filter-btn px-4 py-1.5 text-xs uppercase font-bold rounded-lg bg-blue-900 text-white cursor-pointer shadow-xs";
            } else {
                document.getElementById('btn-todos').className = "filter-btn px-4 py-1.5 text-xs uppercase font-bold rounded-lg bg-blue-900 text-white cursor-pointer shadow-xs";
            }
            ejecutarFiltro();
        }

        function buscarEmpresa() { ejecutarFiltro(); }

        function ejecutarFiltro() {
            const busqueda = document.getElementById('search-input').value.toLowerCase().trim();
            let filtrados = todosLosEmprendimientos;

            if (categoriaActual !== 'TODOS') {
                filtrados = filtrados.filter(i => i.giro === categoriaActual);
            }
            if (busqueda !== '') {
                filtrados = filtrados.filter(i => i.empresa.toLowerCase().includes(busqueda));
            }
            renderizarTarjetas(filtrados);
        }

        window.onload = cargarDirectorio;
    </script>
</body>
</html>
